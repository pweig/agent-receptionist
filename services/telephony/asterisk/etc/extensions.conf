; Dialplan — hands incoming calls to the Pipecat receptionist via AudioSocket.
;
; Prerequisites (on the Docker host):
;   TRANSPORT=sip make dev-sip
; which starts a TCP listener on :8089 speaking Asterisk's AudioSocket protocol.
;
; The Asterisk container reaches the host (macOS / Docker Desktop) via
; host.docker.internal. On a Linux deploy, replace with the host's LAN IP or
; 172.17.0.1 (docker0 gateway).
;
; AudioSocket requires a well-formed UUID as its first argument. Ubuntu 24.04's
; asterisk package does not ship func_uuid.so, so we build one from MD5 of the
; channel's unique id — that gives 32 hex chars which we lay out in 8-4-4-4-12
; form with substring slicing. libuuid only validates the shape, not variant/
; version bits, so this parses fine.
;
; FritzBox routes incoming PSTN calls to the registered SIP user ("receptionist"),
; so the EXTEN is the SIP username string, not a numeric DID. Both patterns below
; catch it: _X. for numeric DIDs, s for the username-based fallback.

[incoming]
exten => _X.,1,NoOp(Incoming call from ${CALLERID(num)} to ${EXTEN})
 same => n,Answer()
 same => n,Set(HEX=${MD5(${CHANNEL(uniqueid)})})
 same => n,Set(ASUUID=${HEX:0:8}-${HEX:8:4}-${HEX:12:4}-${HEX:16:4}-${HEX:20:12})
 same => n,AudioSocket(${ASUUID},host.docker.internal:8089)
 same => n,Hangup()

exten => s,1,NoOp(Incoming call from ${CALLERID(num)} via FritzBox username routing)
 same => n,Answer()
 same => n,Set(HEX=${MD5(${CHANNEL(uniqueid)})})
 same => n,Set(ASUUID=${HEX:0:8}-${HEX:8:4}-${HEX:12:4}-${HEX:16:4}-${HEX:20:12})
 same => n,AudioSocket(${ASUUID},host.docker.internal:8089)
 same => n,Hangup()
