; Minimal dialplan — plays Asterisk's built-in "hello-world" greeting on any incoming call.
; This is the smoke test for M1 Task 1: proves SIP registration + RTP path end-to-end
; before we wire in Pipecat via AudioSocket in M1 Task 2.

[incoming]
exten => _X.,1,NoOp(Incoming call from ${CALLERID(num)} to ${EXTEN})
 same => n,Answer()
 same => n,Wait(1)
 same => n,Playback(hello-world)
 same => n,Wait(1)
 same => n,Hangup()

; Fallback catch-all (calls without a matching DID)
exten => s,1,NoOp(Catch-all incoming)
 same => n,Answer()
 same => n,Playback(hello-world)
 same => n,Hangup()
