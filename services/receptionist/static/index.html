<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Muster Dental — Lena</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8fafc;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 48px 40px;
      width: 360px;
      text-align: center;
    }
    .logo { font-size: 2.4rem; margin-bottom: 8px; }
    h1 { font-size: 1.3rem; color: #1e293b; margin-bottom: 4px; }
    .subtitle { color: #64748b; font-size: 0.9rem; margin-bottom: 32px; }
    .btn {
      display: inline-block;
      padding: 14px 36px;
      border-radius: 10px;
      border: none;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      width: 100%;
    }
    .btn:hover { opacity: 0.88; }
    .btn:disabled { opacity: 0.45; cursor: default; }
    .btn-start { background: #2563eb; color: white; }
    .btn-end   { background: #ef4444; color: white; margin-top: 12px; display: none; }
    #status {
      margin-top: 20px;
      padding: 10px 16px;
      border-radius: 8px;
      background: #f1f5f9;
      color: #475569;
      font-size: 0.875rem;
      min-height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-right: 8px;
      background: #94a3b8;
    }
    .dot.green { background: #22c55e; }
    .dot.red   { background: #ef4444; }
    .dot.pulse {
      background: #2563eb;
      animation: pulse 1.2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🦷</div>
    <h1>Muster Dental Practice</h1>
    <p class="subtitle">Talk to Lena, your AI receptionist</p>

    <button id="startBtn" class="btn btn-start" onclick="startCall()">Start Call</button>
    <button id="endBtn"   class="btn btn-end"   onclick="endCall()">End Call</button>

    <div id="status"><span class="dot"></span>Ready</div>
  </div>

  <script>
    let pc = null;

    function setStatus(text, dotClass) {
      const s = document.getElementById('status');
      s.innerHTML = `<span class="dot ${dotClass}"></span>${text}`;
    }

    async function startCall() {
      document.getElementById('startBtn').disabled = true;
      setStatus('Requesting microphone…', 'pulse');

      let stream;
      try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      } catch (e) {
        setStatus('Microphone access denied.', 'red');
        document.getElementById('startBtn').disabled = false;
        return;
      }

      setStatus('Connecting…', 'pulse');

      pc = new RTCPeerConnection({
        iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
      });

      // Send microphone audio to the bot
      stream.getTracks().forEach(track => pc.addTrack(track, stream));

      // Play incoming audio from the bot
      pc.ontrack = (event) => {
        const audio = new Audio();
        audio.srcObject = event.streams[0];
        audio.autoplay = true;
        document.body.appendChild(audio);
      };

      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);

      // Wait for ICE gathering to complete so all candidates are in the SDP
      await new Promise((resolve) => {
        if (pc.iceGatheringState === 'complete') { resolve(); return; }
        pc.addEventListener('icegatheringstatechange', function check() {
          if (pc.iceGatheringState === 'complete') {
            pc.removeEventListener('icegatheringstatechange', check);
            resolve();
          }
        });
      });

      let answer;
      try {
        const resp = await fetch('/api/offer', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sdp: pc.localDescription.sdp, type: pc.localDescription.type }),
        });
        if (!resp.ok) throw new Error(`Server error ${resp.status}`);
        answer = await resp.json();
      } catch (e) {
        setStatus(`Connection failed: ${e.message}`, 'red');
        pc.close(); pc = null;
        document.getElementById('startBtn').disabled = false;
        return;
      }

      await pc.setRemoteDescription({ sdp: answer.sdp, type: answer.type });

      document.getElementById('startBtn').style.display = 'none';
      document.getElementById('endBtn').style.display = 'block';
      setStatus('Connected — say hello to Lena!', 'green');
    }

    async function endCall() {
      if (pc) { pc.close(); pc = null; }
      document.getElementById('endBtn').style.display = 'none';
      document.getElementById('startBtn').style.display = 'block';
      document.getElementById('startBtn').disabled = false;
      setStatus('Call ended.', '');
    }
  </script>
</body>
</html>
