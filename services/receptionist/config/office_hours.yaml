timezone: "Europe/Berlin"

weekday_hours:
  monday: { open: "08:00", close: "18:00" }
  tuesday: { open: "08:00", close: "18:00" }
  wednesday: { open: "08:00", close: "13:00" }
  thursday: { open: "08:00", close: "18:00" }
  friday: { open: "08:00", close: "15:00" }
  saturday: closed
  sunday: { open: "08:00", close: "15:00" }

# Date-specific exceptions override weekday_hours
exceptions:
  "2026-05-01": closed
  "2026-12-24": { open: "08:00", close: "12:00" }
  "2026-12-31": { open: "08:00", close: "12:00" }

# DE public holidays (adjust Bundesland as needed) + US federal holidays
holidays:
  # Germany 2026
  - "2026-01-01" # Neujahr
  - "2026-04-03" # Karfreitag
  - "2026-04-06" # Ostermontag
  - "2026-05-01" # Tag der Arbeit
  - "2026-05-14" # Christi Himmelfahrt
  - "2026-05-25" # Pfingstmontag
  - "2026-10-03" # Deutsche Einheit
  - "2026-12-25" # 1. Weihnachtstag
  - "2026-12-26" # 2. Weihnachtstag
  # US federal holidays 2026
  - "2026-01-19" # MLK Day
  - "2026-02-16" # Presidents Day
  - "2026-05-25" # Memorial Day
  - "2026-07-04" # Independence Day
  - "2026-09-07" # Labor Day
  - "2026-11-11" # Veterans Day
  - "2026-11-26" # Thanksgiving
  - "2026-12-25" # Christmas

after_hours_routing:
  emergency_number_de: "+49-800-111-2222"
  emergency_number_us: "+1-800-555-0123"
  voicemail_enabled: true
  callback_logging: true
  message_de: >
    Unsere Praxis ist derzeit nicht erreichbar.
    Für zahnärztliche Notfälle rufen Sie bitte {emergency_number} an.
    Wir rufen Sie gerne am nächsten Werktag zurück.
  message_en: >
    Our practice is currently closed.
    For dental emergencies, please call {emergency_number}.
    We will call you back on the next business day.
