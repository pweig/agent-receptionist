llm:
  # --- Groq (cloud, free tier 100k TPD) ---
  # model: llama-3.3-70b-versatile
  # base_url: https://api.groq.com/openai/v1

  # --- Ollama (local, no limits, M3 Mac recommended) ---
  # brew install ollama && ollama pull qwen2.5:14b
  model: qwen2.5:14b
  base_url: http://localhost:11434/v1

  max_tokens: 512
  temperature: 0.3

stt:
  # Use "small" for fast POC testing (~460MB, good EN+DE quality).
  # Switch to "large-v3-turbo" for production-quality transcription.
  model: small
  compute_type: int8
  device: auto
  no_speech_prob: 0.5

tts:
  en:
    voice: en_US-ryan-high
    download_dir: ./models/piper
  de:
    voice: de_DE-thorsten-high
    download_dir: ./models/piper

vad:
  stop_secs: 0.5
  confidence: 0.65

handoff:
  frustration_repeat_threshold: 2
  low_confidence_stt_threshold: 0.45
  low_confidence_consecutive_turns: 2
  tool_error_max: 2

office:
  timezone: Europe/Berlin
  config_path: ./config/office_hours.yaml
  # locale options: "de" | "us"
  locale: de
